<div class="header">
  <div class="headertitle"><div class="title">读标签存储区</div></div>
</div><!--header-->  

<p>读取标签存储区，可以使用<a href="../doc_API_C_html/_module_reader_8h.html#af8f2064aa3fd173098ad437c78838eba">GetTagData</a>函数以及
    <a href="../doc_API_C_html/_module_reader_8h.html#aa955f266a8b7d9ce4abaa44cd94a5082">GetTagDataEx</a>函数。两者功能基本一致，GetTagDataEx多了两个参数，
用于支持Impinj标签的QT功能。</p>
<p>读标签是单标签操作，尽量做到少标签在天线读范围。如果存在多标签在读范围内，第一个响应的标签视为操作标签。要指定标签应该设置过滤条件，<br>过滤条件是一直有效的，故读完标签应清除过滤条件。</p>
<p>注意：写标签要比都标签耗费更多能量，换言之读标签的距离常比写距离远。</p>
